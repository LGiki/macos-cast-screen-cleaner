version: 2

project_name: cast-screen-cleaner

builds:
  - main: .
    binary: cast-screen-cleaner
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: lgiki
    name: macOS-cast-screen-cleaner
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
